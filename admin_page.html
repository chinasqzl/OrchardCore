    <script>
      // ErpAdmin: Inject tenant brand colors
      (function() {
        var tenant = document.documentElement.getAttribute('data-tenant') || 'Default';
        // Generate a consistent brand color from tenant name
        var hash = 0;
        for (var i = 0; i < tenant.length; i++) {
          hash = tenant.charCodeAt(i) + ((hash << 5) - hash);
        }
        var h = Math.abs(hash) % 360;
        // Set brand color as HSL for easy manipulation
        document.documentElement.style.setProperty('--erp-brand-primary-h', h);
      })();
    </script>
